<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日一句">
<meta name="theme-color" content="#0f0e17">
<title>每日一句</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --card: #1f1e2e;
    --border: rgba(255,255,255,0.08);
    --text: #fffffe;
    --sub: rgba(255,255,255,0.45);
    --accent-pos: #f4a261;
    --accent-neg: #6c8ebf;
    --accent-pos-glow: rgba(244,162,97,0.25);
    --accent-neg-glow: rgba(108,142,191,0.25);
    --del: #e06c75;
    --radius: 20px;
    --serif: 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
    transition: opacity 1s ease;
  }
  body::before {
    width: 400px; height: 400px;
    background: var(--accent-pos);
    top: -100px; right: -100px;
  }
  body::after {
    width: 350px; height: 350px;
    background: var(--accent-neg);
    bottom: -80px; left: -80px;
  }
  body.neg-mode::before { opacity: 0.1; }
  body.neg-mode::after  { opacity: 0.45; }
  body.pos-mode::before { opacity: 0.45; }
  body.pos-mode::after  { opacity: 0.1; }

  .container {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 100px;
    min-height: 100dvh;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
  }
  .logo {
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--sub);
    text-transform: uppercase;
  }
  .date-badge {
    font-size: 11px;
    color: var(--sub);
    letter-spacing: 0.08em;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 100px;
  }

  /* Today's card */
  .today-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .quote-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.6s ease, box-shadow 0.6s ease;
  }
  .quote-card::before {
    content: '「';
    position: absolute;
    top: 12px; left: 20px;
    font-family: var(--serif);
    font-size: 80px;
    color: var(--accent-pos);
    opacity: 0.12;
    line-height: 1;
    transition: color 0.6s ease;
  }
  .quote-card.neg::before { color: var(--accent-neg); }
  .quote-card.pos {
    border-color: rgba(244,162,97,0.2);
    box-shadow: 0 0 40px var(--accent-pos-glow);
  }
  .quote-card.neg {
    border-color: rgba(108,142,191,0.2);
    box-shadow: 0 0 40px var(--accent-neg-glow);
  }

  .quote-text {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.8;
    color: var(--text);
    position: relative;
    z-index: 1;
    word-break: break-all;
  }

  .quote-type {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 100px;
    font-family: var(--sans);
  }
  .quote-type.pos {
    background: rgba(244,162,97,0.12);
    color: var(--accent-pos);
    border: 1px solid rgba(244,162,97,0.25);
  }
  .quote-type.neg {
    background: rgba(108,142,191,0.12);
    color: var(--accent-neg);
    border: 1px solid rgba(108,142,191,0.25);
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Spin button */
  .btn-spin {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
    transition: background 0.2s, transform 0.1s, border-color 0.2s;
  }
  .btn-spin:active { transform: scale(0.97); }
  .btn-spin:hover { background: #252436; border-color: rgba(255,255,255,0.15); }
  .spin-icon { font-size: 18px; display: inline-block; transition: transform 0.5s ease; }
  .btn-spin:active .spin-icon { transform: rotate(180deg); }

  /* Section title */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* Quote list */
  .quote-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .quote-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item-content { flex: 1; }
  .item-text {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-all;
  }
  .item-meta {
    font-size: 11px;
    color: var(--sub);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tag {
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10px;
    letter-spacing: 0.05em;
  }
  .tag.pos { background: rgba(244,162,97,0.12); color: var(--accent-pos); }
  .tag.neg { background: rgba(108,142,191,0.12); color: var(--accent-neg); }
  .tag.custom { background: rgba(255,255,255,0.07); color: var(--sub); }

  .btn-del {
    background: none;
    border: none;
    color: var(--sub);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .btn-del:hover { color: var(--del); background: rgba(224,108,117,0.1); }

  /* Add form */
  .add-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 40px;
  }
  .form-title {
    font-family: var(--serif);
    font-size: 15px;
    margin-bottom: 16px;
    color: var(--text);
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(255,255,255,0.25); }
  textarea::placeholder { color: var(--sub); }

  .form-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
  }

  .type-select {
    display: flex;
    gap: 8px;
    flex: 1;
  }
  .type-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--sub);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .type-btn.active.pos {
    background: rgba(244,162,97,0.15);
    border-color: rgba(244,162,97,0.4);
    color: var(--accent-pos);
  }
  .type-btn.active.neg {
    background: rgba(108,142,191,0.15);
    border-color: rgba(108,142,191,0.4);
    color: var(--accent-neg);
  }

  .btn-add {
    background: var(--accent-pos);
    border: none;
    color: #1a1200;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-add:active { transform: scale(0.96); }
  .btn-add:hover { opacity: 0.9; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.35s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* PWA hint */
  .pwa-hint {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 12px;
    color: var(--sub);
    line-height: 1.7;
    text-align: center;
    margin-bottom: 20px;
  }
  .pwa-hint b { color: var(--text); font-weight: 400; }

  /* Fade animation for card */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .quote-card { animation: fadeUp 0.5s ease; }
  .quote-card.animating { animation: fadeUp 0.4s ease; }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--sub);
    font-size: 13px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">每日一句</div>
    <div class="date-badge" id="dateBadge">—</div>
  </header>

  <div class="today-label">今日語錄</div>
  <div class="quote-card" id="todayCard">
    <div class="quote-text" id="todayText">載入中…</div>
    <div class="quote-type" id="todayType"><span class="dot"></span><span id="todayTypeLabel">—</span></div>
  </div>

  <button class="btn-spin" onclick="drawRandom()">
    <span class="spin-icon">✦</span> 再抽一句
  </button>

  <div class="section-title">所有語錄</div>
  <div class="quote-list" id="quoteList"></div>

  <div class="add-form">
    <div class="form-title">＋ 新增句子</div>
    <textarea id="newQuote" rows="3" placeholder="輸入一句話…"></textarea>
    <div class="form-row">
      <div class="type-select">
        <button class="type-btn pos active" id="btnPos" onclick="selectType('pos')">☀ 正能量</button>
        <button class="type-btn neg" id="btnNeg" onclick="selectType('neg')">🌑 負能量</button>
      </div>
      <button class="btn-add" onclick="addQuote()">新增</button>
    </div>
  </div>

  <div class="pwa-hint">
    📱 <b>加到主畫面</b>：iOS 點擊 Safari 分享按鈕 →「加入主畫面」；Android 點選瀏覽器選單 →「加至主螢幕」
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BUILT_IN = [
  { text: "今天的陽光是免費的，但你得先打開眼睛。", type: "pos" },
  { text: "不是每一步都要走得漂亮，但每一步都要走下去。", type: "pos" },
  { text: "你已經比昨天的自己更勇敢了。", type: "pos" },
  { text: "慢慢來，比較快。", type: "pos" },
  { text: "就算全世界不相信你，也要先相信自己。", type: "pos" },
  { text: "微小的善意，會在某個地方開花。", type: "pos" },
  { text: "休息也是努力的一部分。", type: "pos" },
  { text: "不是所有事情都有意義，但你可以選擇讓它有意義。", type: "neg" },
  { text: "有些事努力了還是失敗，這就是人生的誠實。", type: "neg" },
  { text: "完美是假的，遺憾才是真的。", type: "neg" },
  { text: "不是每個人都值得你解釋。", type: "neg" },
  { text: "期待越少，受傷就越輕。", type: "neg" },
  { text: "有時候放棄，才是真正的選擇。", type: "neg" },
  { text: "不是每段關係都值得修復。", type: "neg" },
  { text: "現實從不按照劇本走，這既殘酷又自由。", type: "neg" },
];

let selectedType = 'pos';
let currentRandom = null;

function loadCustom() {
  try { return JSON.parse(localStorage.getItem('customQuotes') || '[]'); }
  catch { return []; }
}

function saveCustom(arr) {
  localStorage.setItem('customQuotes', JSON.stringify(arr));
}

function allQuotes() {
  return [...BUILT_IN, ...loadCustom()];
}

function getTodayIndex() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  return seed % BUILT_IN.length;
}

function getDateStr() {
  const d = new Date();
  const w = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日 週${w[d.getDay()]}`;
}

function setCard(quote, animated) {
  const card = document.getElementById('todayCard');
  const text = document.getElementById('todayText');
  const typeEl = document.getElementById('todayType');
  const label = document.getElementById('todayTypeLabel');

  if (animated) {
    card.classList.remove('animating');
    void card.offsetWidth;
    card.classList.add('animating');
  }

  text.textContent = quote.text;
  card.className = 'quote-card ' + quote.type;
  typeEl.className = 'quote-type ' + quote.type;
  label.textContent = quote.type === 'pos' ? '正能量' : '負能量';

  document.body.className = quote.type === 'pos' ? 'pos-mode' : 'neg-mode';
}

function drawRandom() {
  const all = allQuotes();
  let idx;
  do { idx = Math.floor(Math.random() * all.length); }
  while (all.length > 1 && all[idx].text === document.getElementById('todayText').textContent);
  currentRandom = all[idx];
  setCard(currentRandom, true);
  showToast('✦ 已為你抽出一句');
}

function renderList() {
  const list = document.getElementById('quoteList');
  const custom = loadCustom();
  list.innerHTML = '';

  const all = [...BUILT_IN.map(q => ({...q, custom: false})),
               ...custom.map(q => ({...q, custom: true}))];

  if (all.length === 0) {
    list.innerHTML = '<div class="empty">還沒有語錄</div>';
    return;
  }

  all.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'quote-item';
    div.innerHTML = `
      <div class="item-content">
        <div class="item-text">${escHtml(q.text)}</div>
        <div class="item-meta">
          <span class="tag ${q.type}">${q.type==='pos'?'正能量':'負能量'}</span>
          ${q.custom ? '<span class="tag custom">自訂</span>' : ''}
        </div>
      </div>
      ${q.custom ? `<button class="btn-del" onclick="deleteQuote(${i - BUILT_IN.length})" title="刪除">✕</button>` : ''}
    `;
    list.appendChild(div);
  });
}

function deleteQuote(customIdx) {
  const custom = loadCustom();
  custom.splice(customIdx, 1);
  saveCustom(custom);
  renderList();
  showToast('已刪除');
}

function selectType(t) {
  selectedType = t;
  document.getElementById('btnPos').className = 'type-btn pos' + (t==='pos'?' active':'');
  document.getElementById('btnNeg').className = 'type-btn neg' + (t==='neg'?' active':'');
}

function addQuote() {
  const val = document.getElementById('newQuote').value.trim();
  if (!val) { showToast('請先輸入句子 ✎'); return; }
  const custom = loadCustom();
  custom.push({ text: val, type: selectedType });
  saveCustom(custom);
  document.getElementById('newQuote').value = '';
  renderList();
  showToast('已新增！✦');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
document.getElementById('dateBadge').textContent = getDateStr();
const todayQuote = BUILT_IN[getTodayIndex()];
setCard(todayQuote, false);
renderList();
</script>
</body>
</html>
